name: Telegram to Notion Sync

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: telegram-notion-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Sincronizar mensagens do Telegram para o Notion
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: node telegram-notion-sync/sync.js

      - name: Salvar estado do último update processado
        run: |
          if ! git diff --quiet -- telegram-notion-sync/state.json; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add telegram-notion-sync/state.json
            git commit -m "chore: atualizar estado do sync Telegram -> Notion"
            git push
          else
            echo "Nenhuma mudança de estado para commitar."
          fi
